<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>EndoCare Yemen</title>
    <script>
        (function() {
            var lang = '';
            if (navigator.languages && navigator.languages.length) {
                lang = navigator.languages[0];
            } else {
                lang = navigator.language || navigator.userLanguage || '';
            }
            lang = lang.substring(0, 2).toLowerCase();
            var target = (lang === 'en') ? 'en/home.html' : 'ar/home.html';
            window.location.replace(target);
        })();
    </script>
</head>
<body>
    <noscript>
        <meta http-equiv="refresh" content="0; url=ar/home.html">
    </noscript>
    <a href="ar/home.html">EndoCare Yemen - Arabic</a> |
    <a href="en/home.html">EndoCare Yemen - English</a>
</body>
</html>
